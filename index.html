<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget League Hub</title>
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #03131f;
      overflow: hidden;
    }

    .app-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #03131f;
    }
    #appLoader {
  position: fixed;
  inset: 0;
  background: #03131f;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.loader-wrap {
  position: relative;
  width: 220px;
  height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.loader-emblem {
  width: 112px;
  height: 112px;
  object-fit: contain;
  border-radius: 50%;
  position: relative;
  z-index: 2;
  box-shadow: 0 0 24px rgba(0, 255, 200, 0.18);
  animation: emblemPulse 1.8s ease-in-out infinite;
}
.loader-glow {
  position: absolute;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: radial-gradient(
    circle,
    rgba(24,231,255,0.35) 0%,
    rgba(49,245,169,0.18) 35%,
    rgba(0,0,0,0) 70%
  );
  filter: blur(18px);
  animation: glowPulse 2.5s ease-in-out infinite;
}
.loader-ring {
  position: absolute;
  width: 156px;
  height: 156px;
  border-radius: 50%;
  border: 5px solid rgba(255,255,255,0.08);
  border-top-color: #18e7ff;
  border-right-color: #31f5a9;
  animation: hubSpin 1.15s linear infinite;
}

.loader-text {
  position: absolute;
  bottom: -18px;
  width: 260px;
  text-align: center;
  font-family: Arial, sans-serif;
  font-size: 14px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(225,235,245,0.92);
}

@keyframes hubSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes emblemPulse {
  0% {
    transform: scale(1);
    box-shadow: 0 0 18px rgba(0, 255, 200, 0.14);
  }
  50% {
    transform: scale(1.06);
    box-shadow: 0 0 34px rgba(24, 231, 255, 0.28);
  }
  100% {
    transform: scale(1);
    box-shadow: 0 0 18px rgba(0, 255, 200, 0.14);
  }
}
@keyframes glowPulse {
  0% { transform: scale(0.9); opacity: .6; }
  50% { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(0.9); opacity: .6; }
}
  </style>
</head>
<body>
    <div id="appLoader">
        <div class="loader-wrap">
      
          <div class="loader-glow"></div>
          <img src="favicon.png" class="loader-emblem">
          <div class="loader-ring"></div>
          <div class="loader-text">
            Loading Budget League Hub...
          </div>
      
        </div>
      </div>
  <iframe
    class="app-frame"
    id="hubFrame"
    src="https://script.google.com/macros/s/AKfycbxT0_fZxHmfW7wZBWYV1E4jTarliajWzaDmdlYFYeiYMzd9eLzWVsY6Oq-08Yu8gGqPrg/exec?page=hub"
    title="Budget League Hub"
    loading="eager"
    referrerpolicy="no-referrer"
    allowfullscreen>
  </iframe>
  <script>
    window.addEventListener("load", () => {
      const loader = document.getElementById("appLoader");
    
      setTimeout(() => {
        loader.style.opacity = "0";
        loader.style.transition = "opacity 0.4s ease";
    
        setTimeout(() => {
          loader.style.display = "none";
        }, 400);
      }, 500);
    });
    </script>
</body>
</html>
