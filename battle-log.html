<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Budget League — Battle Log</title>

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

  <style>
    :root {
      --bg: #06111f;
      --accent: #31f5a9;
      --primary: #5aa8ff;
      --text: #edf7ff;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Inter, system-ui, sans-serif;
      background: #06111f;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      opacity: 0;
      transition: opacity .4s ease;
    }

    iframe.loaded {
      opacity: 1;
    }

    /* Loader */
    .loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #06111f;
      z-index: 10;
      transition: opacity .4s ease;
    }

    .loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,.08);
      border-top-color: var(--accent);
      border-right-color: var(--primary);
      animation: spin .9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .title {
      margin-top: 16px;
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }
  </style>
</head>

<body>

  <div id="loader" class="loader">
    <div>
      <div class="spinner"></div>
      <div class="title">Loading Battle Log</div>
    </div>
  </div>

  <iframe id="appFrame"></iframe>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbxT0_fZxHmfW7wZBWYV1E4jTarliajWzaDmdlYFYeiYMzd9eLzWVsY6Oq-08Yu8gGqPrg/exec?page=battle-log";

    const iframe = document.getElementById("appFrame");
    const loader = document.getElementById("loader");

    iframe.src = APP_URL;

    iframe.onload = () => {
      iframe.classList.add("loaded");
      setTimeout(() => loader.classList.add("hidden"), 300);
    };

    // fallback
    setTimeout(() => {
      iframe.classList.add("loaded");
      loader.classList.add("hidden");
    }, 5000);
  </script>

</body>
</html>
