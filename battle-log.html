<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget League — Battle Log</title>

  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    :root {
      --bg: #06111f;
      --card: rgba(10, 25, 47, 0.8);
      --border: rgba(90, 168, 255, 0.25);
      --accent: #31f5a9;
      --accent2: #5aa8ff;
      --text: #e6f1ff;
      --muted: #8aa0b6;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    #loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 10;
      background: radial-gradient(circle at center, #0a192f, #020c1b);
    }

    .loader-box {
      padding: 28px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      text-align: center;
      width: 260px;
    }

    .spinner {
      width: 80px;
      height: 80px;
      margin: 0 auto 14px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent);
      border-right-color: var(--accent2);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .loader-sub {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .loader-copy {
      font-size: 12px;
      color: var(--muted);
    }

    #app-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    #app-frame.ready {
      opacity: 1;
    }
  </style>
</head>
<body>

<div id="loader">
  <div class="loader-box">
    <div class="spinner"></div>
    <div class="loader-sub">Battle Log Intake</div>
    <div class="loader-title">Opening Battle Log</div>
    <div class="loader-copy">Launching submission tools…</div>
  </div>
</div>

<iframe
  id="app-frame"
  src="https://script.google.com/macros/s/AKfycbxT0_fZxHmfW7wZBWYV1E4jTarliajWzaDmdlYFYeiYMzd9eLzWVsY6Oq-08Yu8gGqPrg/exec"
></iframe>

<script>
  const iframe = document.getElementById("app-frame");
  const loader = document.getElementById("loader");

  iframe.addEventListener("load", () => {
    iframe.classList.add("ready");
    loader.style.display = "none";
  });

  setTimeout(() => {
    iframe.classList.add("ready");
    loader.style.display = "none";
  }, 1500);
</script>

</body>
</html>
